name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck src
        run: npm run typecheck

      - name: Typecheck examples
        run: npx tsc --noEmit --strict --target ES2020 --module NodeNext --moduleResolution NodeNext --esModuleInterop --skipLibCheck examples/*.ts

      - name: Test
        run: npm test
        env:
          CI: true
